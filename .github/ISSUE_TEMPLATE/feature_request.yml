name: 💡 Feature Request
description: Suggest a new option, randomization mode, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea! Please describe what you'd like and why.
  - type: dropdown
    id: game
    attributes:
      label: Which game(s)?
      multiple: true
      options:
        - Yellow Legacy
        - Crystal Legacy
        - Emerald Legacy
        - All / the launcher
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is it useful?
      description: What problem does it solve, or how does it improve the experience?
  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't already requested
          required: true
