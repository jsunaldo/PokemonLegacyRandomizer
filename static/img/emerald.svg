<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 210" role="img" aria-label="Emerald Legacy cartridge">
  <!-- body -->
  <path d="M10 8 H108 L150 46 V196 a6 6 0 0 1 -6 6 H16 a6 6 0 0 1 -6 -6 V8 Z" fill="#4caf7d"/>
  <!-- chamfer shade -->
  <path d="M108 8 L150 46 V60 L108 22 Z" fill="#000000" opacity="0.18"/>
  <!-- grip ridges -->
  <g fill="#000000" opacity="0.22">
    <rect x="20" y="16" width="28" height="5" rx="2.5"/>
    <rect x="20" y="26" width="28" height="5" rx="2.5"/>
    <rect x="20" y="36" width="28" height="5" rx="2.5"/>
  </g>
  <!-- label -->
  <rect x="26" y="64" width="108" height="104" rx="9" fill="#0e0f1a"/>
  <rect x="26" y="64" width="108" height="104" rx="9" fill="none" stroke="#4caf7d" stroke-opacity="0.55" stroke-width="2"/>
  <!-- icon -->
  <text x="80" y="104" text-anchor="middle" font-size="36">💚</text>
  <!-- name -->
  <text x="80" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16" letter-spacing="1" fill="#4caf7d">EMERALD</text>
  <text x="80" y="151" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="16" letter-spacing="1" fill="#4caf7d">LEGACY</text>
  <!-- platform pill -->
  <rect x="52" y="176" width="56" height="19" rx="9.5" fill="#4caf7d"/>
  <text x="80" y="189.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="10.5" letter-spacing="1" fill="#0e0f1a">GBA</text>
</svg>
